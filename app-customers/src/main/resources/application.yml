server:
  port: 8090

spring:
  application:
    name: app-customers

  config:
    import: "optional:consul:"

  datasource:
    url: jdbc:postgresql://localhost:5432/books20262026
    username: postgres
    password: labcom,2015
    driver-class-name: org.postgresql.Driver

  cloud:
    consul:
      host: ${SPRING_CLOUD_CONSUL_HOST:localhost}
      port: ${SPRING_CLOUD_CONSUL_PORT:8500}
      enabled: true

      discovery:
        enabled: true
        register: true

        tags:
          - traefik.enable=true
          - traefik.http.routers.router-app-customers.rule=PathPrefix(`/app-customers`)
          - traefik.http.routers.router-app-customers.middlewares=middleware-customers
          - traefik.http.middlewares.middleware-customers.stripprefix.prefixes=/app-customers

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always
      # Without this, Spring Boot only auto-creates the liveness/readiness
      # health groups when it detects it's running inside Kubernetes. In plain
      # Docker/docker-compose that autodetection never fires, so
      # /actuator/health/liveness and /actuator/health/readiness return 404
      # and the docker-compose healthcheck for this service never succeeds
      # (which in turn blocks the "web" container from ever starting).
      probes:
        enabled: true
      group:
        readiness:
          # DB connectivity belongs in readiness (equivalent to @Readiness in
          # MicroProfile Health), not liveness: a DB hiccup should take this
          # instance out of rotation, not get the container restarted.
          include: readinessState,db,customerService
    prometheus:
      enabled: true

  prometheus:
    metrics:
      export:
        enabled: true