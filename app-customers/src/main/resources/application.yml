server:
  port: 8090
spring:
  application:
    name: app-customers
  config:
    import: "optional:consul:"
  datasource:
    url: jdbc:postgresql://localhost:5432/books20262026
    username: postgres
    password: 'labcom,2015'
    driver-class-name: org.postgresql.Driver
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        tags:
          - framework=springboot-4.0.6
          - traefik.enable=true
