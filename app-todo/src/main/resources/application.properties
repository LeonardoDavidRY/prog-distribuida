quarkus.http.port=8082
quarkus.datasource.db-kind=postgresql
# app-todo usa su PROPIA base de datos ("tododb"), separada de "books20262026"
# (la que comparten authors/books/customers). Esto lo hace independiente: no
# necesita que app-authors (ni ningún otro módulo) exista o corra primero.
# IMPORTANTE: hay que crear la base "tododb" a mano una vez en tu Postgres local
# antes de correr quarkusDev, por ejemplo: psql -U postgres -c "CREATE DATABASE tododb"
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tododb
quarkus.datasource.username=postgres
quarkus.datasource.password=root
quarkus.http.host=0.0.0.0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.validate-on-migrate=false

app.tittle=Todo Q

#--Metrics/Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

#--Health
quarkus.smallrye-health.enabled=true

#--Tracing (MicroProfile Telemetry / OpenTelemetry)
quarkus.application.name=app-todo
# gRPC OTLP endpoint of the tracing backend (Jaeger). Overridden by QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT in docker-compose.
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# Adds a span for every JDBC query run through the datasource.
quarkus.datasource.jdbc.telemetry=true

#--Users REST Client (jsonplaceholder) timeouts
quarkus.rest-client."UserRestClient".connect-timeout=3000
quarkus.rest-client."UserRestClient".read-timeout=5000

#--Todos source REST Client (jsonplaceholder) timeouts - usado solo al arrancar para poblar la DB
quarkus.rest-client."TodoSourceRestClient".connect-timeout=3000
quarkus.rest-client."TodoSourceRestClient".read-timeout=8000

#--CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD

#optional, default to the system username
quarkus.container-image.group=edlith

#optional, defaults to the application name
quarkus.container-image.name=app-todo

#optional, defaults to the application version
quarkus.container-image.tag=latest

quarkus.kubernetes.env.vars.quarkus-datasource-jdbc-url=jdbc:postgresql://postgres:5432/books-db
