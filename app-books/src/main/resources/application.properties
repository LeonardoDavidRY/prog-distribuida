quarkus.http.port=8081
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/books20262026
quarkus.datasource.username=postgres
quarkus.datasource.password=labcom,2015

app.tittle=Books Q
quarkus.http.host=0.0.0.0

#--Metrics/Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

#--Health
quarkus.smallrye-health.enabled=true

#--Tracing (MicroProfile Telemetry / OpenTelemetry)
quarkus.application.name=app-books
# gRPC OTLP endpoint of the tracing backend (Jaeger). Overridden by QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT in docker-compose.
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# Adds a span for every JDBC query run through the datasource.
quarkus.datasource.jdbc.telemetry=true

#authors.url.lb=localhost:8070,localhost:8071
#quarkus.stork.authors-api.service-discovery.type=static
#quarkus.stork.authors-api.service-discovery.address-list=${authors.url.lb}
#quarkus.stork.authors-api.load-balancer.type=round-robin

quarkus.stork.authors-api.service-discovery.type=consul
quarkus.stork.authors-api.service-discovery.consul-host=${consul.host}
quarkus.stork.authors-api.service-discovery.consul-port=${consul.port}
quarkus.stork.authors-api.service-discovery.application=app-authors
quarkus.stork.authors-api.service-discovery.refresh-period=5s

#--CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD

#optional, default to the system username
quarkus.container-image.group=edlith

#optional, defaults to the application name
quarkus.container-image.name=app-books

#optional, defaults to the application version
quarkus.container-image.tag=latest

quarkus.kubernetes.env.vars.quarkus-datasource-jdbc-url=jdbc:postgresql://postgres:5432/books-db
