apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-authors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-authors
  template:
    metadata:
      labels:
        app: app-authors
    spec:
      containers:
        - name: app-authors
          image: leonardodavidry/app-authors
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://db-server:5432/books20262026"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "postgres"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "labcom,2015"
            - name: QUARKUS_HTTP_PORT
              value: "8080"
            - name: CONSUL_PORT
              value: "8500"
            - name: CONSUL_HOST
              value: "consul"
            - name: QUARKUS_FLYWAY_MIGRATE_AT_START
              value: "true"
            - name: QUARKUS_FLYWAY_ACTIVE
              value: "true"
            # ---- RECURSOS DE CPU Y MEMORIA ----
          resources:
            requests:
              memory: "512Mi"   # Memoria mínima garantizada para Quarkus
              cpu: "500m"       # Equivalente a 0.25 vCPU (suficiente para iniciar)

---
apiVersion: v1
kind: Service
metadata:
  name: app-authors
spec:
  type: ClusterIP
  selector:
    app: app-authors
  ports:
    - port: 8080
      targetPort: 8080