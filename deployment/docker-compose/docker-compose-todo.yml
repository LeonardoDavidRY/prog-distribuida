name: todo-app
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: labcom,2015
      POSTGRES_DB: tododb
    ports:
      - 127.0.0.1:55433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  consul:
    image: consul:1.13.4
    command:
      - agent
      - -dev
      - -ui
      - -bind=0.0.0.0
      - -client=0.0.0.0
    ports:
      - 8500:8500
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8500/ui/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - 16686:16686 # Jaeger UI
      - 4317:4317   # OTLP gRPC receiver (usado por app-todo)

  proxy:
    image: traefik:3.7.5
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.consulCatalog
      - --providers.consulCatalog.endpoint.address=consul:8500
      - --providers.consulCatalog.exposedByDefault=false
      - --providers.consulCatalog.refreshInterval=5s
    ports:
      - 8888:8080
      - 8080:80
    depends_on:
      consul:
        condition: service_healthy

  todo:
    build:
      context: ../../app-todo
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: todo-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/tododb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: "labcom,2015"
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      QUARKUS_REST_CLIENT_USERRESTCLIENT_URL: https://jsonplaceholder.typicode.com
      QUARKUS_REST_CLIENT_TODOSOURCERESTCLIENT_URL: https://jsonplaceholder.typicode.com
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    expose:
      - 8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      db-server:
        condition: service_healthy
      consul:
        condition: service_healthy
      jaeger:
        condition: service_started

  web-todo:
    build:
      context: ../../web-todo
      dockerfile: Dockerfile.jvm
    container_name: web-todo-app
    ports:
      - "80:80"
    depends_on:
      todo:
        condition: service_healthy
