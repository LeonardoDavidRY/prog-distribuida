name: books-app
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: labcom,2015
      POSTGRES_DB: books20262026
    #    volumes:
    #     - "c:/tools/distri/db:/var/lib/postgresql/data"
    ports:
      - 54321:5432
  consul:
    image: consul:1.13.4
    command: |
      agent -dev
      -ui
      -bind 0.0.0.0
      -client 0.0.0.0
    ports:
      - 8500:8500
  proxy:
    image: traefik:3.7.5
    command: |
      --api.insecure=true
      --api.dashboard=true
      --providers.consulCatalog
      --providers.consulCatalog.endpoint.address=consul:8500
      --providers.consulCatalog.exposeByDefault=false
      --providers.consulCatalog.refreshInterval=5s
    ports:
      - 8888:8080
      - 8080:80
  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: "labcom,2015"
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    # ports:
    #   - 8070:8070
    depends_on:
      - db-server
      - consul
  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: "labcom,2015"
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    #    ports:
    #      - 8070:8070
    depends_on:
      - db-server
      - consul
      - authors
  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customers-app
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books20262026
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "labcom,2015"
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    # ports:
    #   - 8070:8070
    depends_on:
      - db-server
      - consul
  web:
    build:
      context: ../../app-web
      dockerfile: Dockerfile.jvm
    container_name: web-app
    ports:
      - "80:80"
    depends_on:
      - authors
      - books
      - customers