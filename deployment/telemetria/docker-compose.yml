name: telemetria
services:

  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: labcom,2015
      POSTGRES_DB: books20262026
    volumes:
      - "c:/distribuida2626/db:/var/lib/postgresql/data"
    ports:
      - 5432:5432
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./configs:/etc/prometheus
    ports:
      - 9090:9090
  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8070:8080
    expose:
      - 8080
  books:
     build:
       context: ../../app-books
       dockerfile: src/main/docker/Dockerfile.jvm
     container_name: books-app
     environment:
       QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
       QUARKUS_DATASOURCE_USERNAME: postgres
       QUARKUS_DATASOURCE_PASSWORD: labcom,2015
       QUARKUS_HTTP_PORT: 8080
       QUARKUS_HOST: consul
       QUARKUS_PORT: 8500
     ports:
       - 8071:8080

volumes:
  postgres_data: