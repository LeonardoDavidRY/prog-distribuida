name: telemetria

services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: labcom,2015
      POSTGRES_DB: books20262026
    volumes:
      - "c:/distribuida2626/db:/var/lib/postgresql/data"
#    ports:
#      - 54321:5432
#    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  consul:
    image: consul:1.15.4
    command: |
      agent -dev
      -ui
      -bind 0.0.0.0
      -client 0.0.0.0
    ports:
      - 8500:8500

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./configs:/etc/prometheus
    ports:
     - 9090:9090
#    restart: unless-stopped
    expose:
      - 9000

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
#4475 9628 14430
  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HOST: consul
      CONSUL_PORT: 8500
#    ports:
#      - 8072:8080
    expose:
      - 8080
#    restart: unless-stopped
#    depends_on:
#      - db-server
#      - consul

  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HOST: consul
      QUARKUS_PORT: 8500
#    ports:
#      - 8071:8080
    expose:
      - 8080
#    restart: unless-stopped
#    depends_on:
#      - db-server
#      - consul

  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customers-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books20262026
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: labcom,2015
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
#    ports:
#      - 8091:8090
#    restart: unless-stopped
#    depends_on:
#      - db-server
#      - consul
  proxy:
    image: traefik:3.7.5
    command: |
      --api.insecure=true
      --api.dashboard=true
      --entryPoints.metrics.address=":8082"
      --entryPoints.http.address=":80"
      --entryPoints.traefik.address=":8080"
      --providers.consulCatalog
      --providers.consulCatalog.endpoint.address=consul:8500
      --providers.consulCatalog.exposedByDefault=false
      --providers.consulCatalog.refreshInterval=5s
      --metrics.prometheus=true
      --metrics.prometheus.entryPoint=metrics
    ports:
      - 8888:8080
      - 8080:80
      - 8082:8082
  postgresql-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_URI: "db-server:5432/books20262026?sslmode=disable"
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: labcom,2015
    ports:
      - 9187:9187

volumes:
  postgres_data: